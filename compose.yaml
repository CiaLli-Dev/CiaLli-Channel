name: cialli
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      APP_SITE_URL: ${APP_SITE_URL:-http://localhost:4321}
      APP_TRUST_PROXY: ${APP_TRUST_PROXY:-0}
      ENABLE_VERCEL_ANALYTICS: ${ENABLE_VERCEL_ANALYTICS:-0}
      DIRECTUS_URL: ${DIRECTUS_URL:-}
      DIRECTUS_STATIC_TOKEN: ${DIRECTUS_STATIC_TOKEN:-}
      BANGUMI_TOKEN_ENCRYPTION_KEY: ${BANGUMI_TOKEN_ENCRYPTION_KEY:-}
      PUBLIC_ASSET_BASE_URL: ${PUBLIC_ASSET_BASE_URL:-}
      KV_REST_API_URL: ${KV_REST_API_URL:-}
      KV_REST_API_TOKEN: ${KV_REST_API_TOKEN:-}
      REDIS_NAMESPACE: ${REDIS_NAMESPACE:-demo:docker}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4321/api/healthz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cialli-network

networks:
  cialli-network:
    driver: bridge
